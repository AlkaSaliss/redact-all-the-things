name: Feature request
description: Propose a scoped capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success without prescribing unnecessary implementation.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: State what is in and out of scope.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Expected impact
      options:
        - label: Runtime behavior
        - label: API or data model
        - label: Infrastructure
        - label: Security or privacy
        - label: Documentation or architecture
