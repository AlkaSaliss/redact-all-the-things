name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include sensitive documents, credentials, or personal data.
        Use synthetic fixtures only.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal steps using non-sensitive data.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include revision, browser, operating system, and relevant versions.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I used only synthetic or sanitized data.
          required: true
        - label: I searched for an existing issue.
          required: true
